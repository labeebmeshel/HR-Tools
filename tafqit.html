<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة التفقيط العربي والإنجليزي</title>
    <style>
        :root { --primary: #0b4fb3; --secondary: #f0f4f8; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f1f5f9; padding: 20px; color: #1e293b; }
        .calc-wrapper { max-width: 700px; margin: auto; background: var(--white); padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: var(--primary); text-align: center; margin-bottom: 25px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: var(--primary); }
        input { width: 100%; padding: 15px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 1.2rem; box-sizing: border-box; text-align: center; }
        .result-box { margin-top: 25px; padding: 20px; border-radius: 12px; background: #f8fafc; border: 1px solid #e2e8f0; }
        .res-item { margin-bottom: 15px; }
        .res-item:last-child { margin-bottom: 0; }
        .res-label { font-size: 0.9rem; color: #64748b; font-weight: bold; display: block; margin-bottom: 5px; }
        .res-text { font-size: 1.1rem; color: #0f172a; font-weight: 600; line-height: 1.6; }
        .copy-btn { cursor: pointer; color: var(--primary); font-size: 0.8rem; margin-right: 10px; text-decoration: underline; }
    </style>
</head>
<body>

<div class="calc-wrapper">
    <h2>أداة التفقيط المهنية</h2>
    <div class="input-group">
        <label>أدخل المبلغ الرقمي:</label>
        <input id="numInput" type="number" step="0.01" placeholder="0.00" oninput="convert()">
    </div>

    <div class="result-box">
        <div class="res-item">
            <span class="res-label">التفقيط بالعربي (جنيه مصري):</span>
            <div id="resAr" class="res-text">أدخل مبلغاً للبدء...</div>
        </div>
        <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 15px 0;">
        <div class="res-item">
            <span class="res-label">In English (EGP):</span>
            <div id="resEn" class="res-text">Waiting for input...</div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/n2words@2.0.2/dist/n2words.min.js"></script>
<script>
    function convert() {
        const val = document.getElementById('numInput').value;
        if (!val) {
            document.getElementById('resAr').innerText = "أدخل مبلغاً للبدء...";
            document.getElementById('resEn').innerText = "Waiting for input...";
            return;
        }

        const num = parseFloat(val);
        const integerPart = Math.floor(num);
        const decimalPart = Math.round((num - integerPart) * 100);

        // التفقيط العربي
        try {
            let arText = n2words(integerPart, {lang: 'ar'}) + " جنيه مصري";
            if (decimalPart > 0) {
                arText += " و " + n2words(decimalPart, {lang: 'ar'}) + " قرشاً لا غير";
            } else {
                arText += " لا غير";
            }
            document.getElementById('resAr').innerText = arText;
        } catch (e) { console.error(e); }

        // التفقيط الإنجليزي
        try {
            let enText = "Only " + n2words(integerPart, {lang: 'en'}) + " Egyptian Pounds";
            if (decimalPart > 0) {
                enText += " and " + n2words(decimalPart, {lang: 'en'}) + " Piastres";
            }
            enText += ".";
            document.getElementById('resEn').innerText = enText.charAt(0).toUpperCase() + enText.slice(1);
        } catch (e) { console.error(e); }
    }
</script>
</body>
</html>
