<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة التفقيط الاحترافية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0b4fb3; --secondary: #f0f4f8; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f1f5f9; padding: 20px; color: #1e293b; }
        .calc-wrapper { max-width: 700px; margin: auto; background: var(--white); padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: var(--primary); text-align: center; margin-bottom: 25px; }
        
        .input-group { margin-bottom: 20px; text-align: center; }
        label { display: block; font-weight: bold; margin-bottom: 10px; color: var(--primary); font-size: 1.1rem; }
        input { width: 80%; padding: 15px; border: 2px solid #cbd5e1; border-radius: 12px; font-size: 1.5rem; text-align: center; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        
        .convert-btn { background: var(--primary); color: white; border: none; padding: 15px 40px; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s; width: 80%; }
        .convert-btn:hover { background: #084a8a; transform: translateY(-2px); }

        .result-box { margin-top: 30px; padding: 20px; border-radius: 15px; background: #f8fafc; border: 1px solid #e2e8f0; }
        .res-item { position: relative; padding: 15px; background: white; border-radius: 10px; margin-bottom: 15px; border: 1px solid #edf2f7; }
        .res-label { font-size: 0.9rem; color: #64748b; font-weight: bold; display: block; margin-bottom: 10px; }
        .res-text { font-size: 1.15rem; color: #0f172a; font-weight: 600; line-height: 1.6; padding-left: 45px; min-height: 25px; }
        
        .copy-btn { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); background: #f1f5f9; border: none; padding: 8px; border-radius: 8px; cursor: pointer; color: var(--primary); transition: 0.3s; }
        .copy-btn:hover { background: var(--primary); color: white; }
        .copy-btn i { font-size: 1.1rem; }
        
        .toast { position: fixed; bottom: 20px; right: 20px; background: #10b981; color: white; padding: 12px 24px; border-radius: 8px; display: none; z-index: 1000; }
    </style>
</head>
<body>

<div class="calc-wrapper">
    <h2>أداة التفقيط المالي</h2>
    
    <div class="input-group">
        <label>أدخل المبلغ الرقمي (بالجنيه):</label>
        <input id="numInput" type="number" step="0.01" placeholder="0.00">
        <br>
        <button class="convert-btn" onclick="convert()">تحويل إلى حروف</button>
    </div>

    <div class="result-box">
        <div class="res-item">
            <span class="res-label">التفقيط بالعربي:</span>
            <div id="resAr" class="res-text">--</div>
            <button class="copy-btn" onclick="copyText('resAr')" title="نسخ"><i class="fas fa-copy"></i></button>
        </div>
        
        <div class="res-item">
            <span class="res-label">In English:</span>
            <div id="resEn" class="res-text">--</div>
            <button class="copy-btn" onclick="copyText('resEn')" title="نسخ"><i class="fas fa-copy"></i></button>
        </div>
    </div>
</div>

<div id="toast" class="toast">تم النسخ بنجاح!</div>

<script src="https://cdn.jsdelivr.net/npm/n2words@2.0.2/dist/n2words.min.js"></script>
<script>
    function convert() {
        const val = document.getElementById('numInput').value;
        if (!val || val == 0) {
            alert("يرجى إدخال مبلغ صحيح");
            return;
        }

        const num = parseFloat(val);
        const integerPart = Math.floor(num);
        const decimalPart = Math.round((num - integerPart) * 100);

        // التفقيط العربي
        try {
            let arText = "فقط " + n2words(integerPart, {lang: 'ar'}) + " جنيه مصري";
            if (decimalPart > 0) {
                arText += " و " + n2words(decimalPart, {lang: 'ar'}) + " قرشاً لا غير";
            } else {
                arText += " لا غير";
            }
            document.getElementById('resAr').innerText = arText;
        } catch (e) { document.getElementById('resAr').innerText = "خطأ في التحويل"; }

        // التفقيط الإنجليزي
        try {
            let enText = "Only " + n2words(integerPart, {lang: 'en'}) + " Egyptian Pounds";
            if (decimalPart > 0) {
                enText += " and " + n2words(decimalPart, {lang: 'en'}) + " Piastres";
            }
            enText += " only.";
            document.getElementById('resEn').innerText = enText;
        } catch (e) { document.getElementById('resEn').innerText = "Error in conversion"; }
    }

    function copyText(elementId) {
        const text = document.getElementById(elementId).innerText;
        if (text === "--") return;
        
        navigator.clipboard.writeText(text).then(() => {
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        });
    }
</script>
</body>
</html>
