<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرئيسية - الميثاق الذكي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #0b4fb3; 
            --accent: #1e3a8a; 
            --white: #ffffff; 
            --text-dark: #1e293b;
            --text-light: #64748b;
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            min-height: 100vh;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            text-align: center;
        }

        .hero-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .hero-section { 
            max-width: 1000px; 
            width: 100%;
        }

        h1 { 
            color: var(--primary); 
            font-size: clamp(2rem, 5vw, 3.2rem); 
            margin: 0;
            font-weight: 800;
            line-height: 1.2;
        }

        .main-title-sub {
            color: var(--primary);
            font-size: clamp(1.8rem, 4.5vw, 2.8rem);
            font-weight: 800;
            margin-bottom: 10px;
            display: block;
        }

        .subtitle { 
            font-size: clamp(1rem, 2.5vw, 1.3rem); 
            color: var(--accent); 
            margin-bottom: 20px; 
            font-weight: 600;
        }

        .social-links {
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-links a {
            color: var(--primary);
            font-size: 1.8rem;
            transition: transform 0.3s ease;
            text-decoration: none;
        }

        .social-links a:hover {
            transform: scale(1.2);
            color: var(--accent);
        }
        
        .tools-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
            margin-top: 20px;
        }
        
        .tool-card {
            background: var(--white);
            padding: 30px 15px;
            border-radius: 20px;
            text-decoration: none;
            color: var(--primary);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.8);
            cursor: pointer;
        }
        
        .tool-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 35px -10px rgba(11, 79, 179, 0.2);
            border-color: var(--primary);
        }
        
        .tool-card i { 
            font-size: 2.5rem; 
            margin-bottom: 15px; 
            display: block;
            color: var(--primary);
        }

        .tool-card span { 
            font-size: 1.15rem; 
            font-weight: 700;
        }

        .tool-card p {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-top: 8px;
        }

        footer {
            padding: 20px;
            color: var(--text-light);
            font-size: 0.9rem;
            border-top: 1px solid rgba(0,0,0,0.05);
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

    <div class="hero-container">
        <div class="hero-section">
            <h1>المصدر الأول</h1>
            <span class="main-title-sub">لأدوات الموارد البشرية في مصر</span>
            <p class="subtitle">مشروع الميثاق الذكي برعاية أكاديمية براكسي PRAXI</p>
            
            <div class="social-links">
                <a href="https://web.facebook.com/praxiacademy/" target="_blank"><i class="fab fa-facebook"></i></a>
                <a href="https://www.linkedin.com/company/praxiacademy/" target="_blank"><i class="fab fa-linkedin"></i></a>
            </div>

            <div class="tools-grid">
                <div class="tool-card" onclick="window.parent.loadPage(null, 'cv-frame', 1)">
                    <i class="fas fa-id-card"></i>
                    <span>السيرة الذاتية</span>
                    <p>Professional Resume</p>
                </div>
                
                <div class="tool-card" onclick="window.parent.loadPage(null, 'tax-frame', 2)">
                    <i class="fas fa-calculator"></i>
                    <span>حاسبة الضرائب</span>
                    <p>Gross & Net Tax</p>
                </div>
                
                <div class="tool-card" onclick="window.parent.loadPage(null, 's1-frame', 3)">
                    <i class="fas fa-file-contract"></i>
                    <span>س1 تأمينات</span>
                    <p>أجر الاشتراك التأميني</p>
                </div>

                <div class="tool-card" onclick="window.parent.loadPage(null, 'tafqit-frame', 4)">
                    <i class="fas fa-spell-check"></i>
                    <span>أداة التفقيط</span>
                    <p>Number to Words</p>
                </div>
            </div>
        </div>
    </div>

    <footer>
        جميع الحقوق محفوظة &copy; 2026 - أكاديمية براكسي
    </footer>

</body>
</html>
