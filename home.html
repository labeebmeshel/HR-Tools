<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرئيسية - لبيب ميشيل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0b4fb3; --accent: #1e3a8a; --white: #ffffff; }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            text-align: center;
        }
        .hero-section { max-width: 800px; padding: 40px; }
        h1 { 
            color: var(--primary); 
            font-size: 3rem; 
            margin-bottom: 10px; 
            font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        p { font-size: 1.4rem; color: #475569; margin-bottom: 40px; }
        
        .tools-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
            margin-top: 20px;
        }
        
        .tool-card {
            background: var(--white);
            padding: 30px 20px;
            border-radius: 15px;
            text-decoration: none;
            color: var(--primary);
            font-weight: bold;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            border: 2px solid transparent;
            cursor: pointer;
        }
        
        .tool-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }
        
        .tool-card i { font-size: 2.5rem; margin-bottom: 15px; display: block; }
        .tool-card span { font-size: 1.2rem; }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            p { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <h1>المصدر الأول لأدوات الموارد البشرية في مصر</h1>
        <p>منصة لبيب ميشيل الاحترافية لخدمات الـ HR والـ Payroll</p>

        <div class="tools-grid">
            <div class="tool-card" onclick="window.parent.loadPage(event, 'cv-frame', 1)">
                <i class="fas fa-file-user"></i>
                <span>السيرة الذاتية</span>
            </div>
            
            <div class="tool-card" onclick="window.parent.loadPage(event, 'tax-frame', 2)">
                <i class="fas fa-calculator"></i>
                <span>حاسبة الضرائب</span>
            </div>
            
            <div class="tool-card" onclick="window.parent.loadPage(event, 's1-frame', 3)">
                <i class="fas fa-file-invoice-dollar"></i>
                <span>س1 تأمينات</span>
            </div>
        </div>
    </div>

</body>
</html>
