<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة ضريبة كسب العمل - مصر 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0b4fb3;
            --primary-dark: #093e8d;
            --bg: #f1f5f9;
            --surface: #ffffff;
            --surface-soft: #f8fbff;
            --text: #14263f;
            --muted: #5d728d;
            --border: #d9e3f0;
            --success: #0d8a49;
            --shadow: 0 12px 28px rgba(13, 46, 94, 0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Cairo", "Segoe UI", Tahoma, sans-serif;
            background: radial-gradient(circle at top right, #e8f1ff 0%, var(--bg) 55%);
            color: var(--text);
            padding: 24px;
            min-height: 100vh;
        }

        .calc-wrapper {
            max-width: 980px;
            margin: 0 auto;
            background: var(--surface);
            padding: 30px;
            border-radius: 18px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.7);
        }

        .main-title {
            text-align: center;
            color: var(--primary);
            margin: 0;
            font-size: clamp(1.25rem, 2.8vw, 1.75rem);
            font-weight: 700;
            line-height: 1.4;
        }

        .sub-title {
            text-align: center;
            color: var(--muted);
            font-size: 0.93rem;
            margin: 10px auto 24px;
            line-height: 1.6;
            max-width: 700px;
        }

        /* ===== MODE SWITCHER ===== */
        .mode-switcher {
            display: flex;
            background: #eef3fc;
            border-radius: 12px;
            padding: 5px;
            margin-bottom: 24px;
            gap: 4px;
        }
        .mode-btn {
            flex: 1;
            padding: 11px 10px;
            border: none;
            border-radius: 9px;
            font-family: "Cairo", sans-serif;
            font-size: 0.93rem;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            color: var(--muted);
            transition: all 0.22s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
        }
        .mode-btn.active {
            background: #fff;
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(11,79,179,0.13);
        }
        .mode-btn .mode-icon {
            font-size: 1.1rem;
        }
        .mode-badge {
            font-size: 0.72rem;
            background: #d0e2ff;
            color: var(--primary);
            padding: 2px 7px;
            border-radius: 100px;
            font-weight: 700;
        }
        .mode-btn.active .mode-badge {
            background: var(--primary);
            color: #fff;
        }

        /* ===== INPUTS ===== */
        .input-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 18px;
        }

        .input-group { display: flex; flex-direction: column; gap: 6px; }

        .input-group label {
            font-weight: 700;
            color: var(--primary);
            font-size: 0.91rem;
        }
        .input-group .sub-label {
            font-size: 0.78rem;
            color: var(--muted);
            margin-top: -4px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-wrapper input[type="number"] {
            width: 100%;
            padding: 12px 13px 12px 44px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-family: "Cairo", sans-serif;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            background: #fff;
            -moz-appearance: textfield;
        }
        .input-wrapper input[type="number"]::-webkit-inner-spin-button,
        .input-wrapper input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
        .input-wrapper input[type="number"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(11,79,179,0.12);
        }
        .input-currency {
            position: absolute;
            left: 13px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #94a3b8;
            pointer-events: none;
            letter-spacing: 0.3px;
        }

        /* reverse mode highlight */
        .input-group.reverse-primary label { color: #0d8a49; }
        .input-group.reverse-primary .input-wrapper input:focus {
            border-color: #0d8a49;
            box-shadow: 0 0 0 3px rgba(13,138,73,0.12);
        }

        .special-card {
            margin: 10px 0 18px;
            background: var(--surface-soft);
            border: 1px solid #d8e8ff;
            border-radius: 12px;
            padding: 13px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
            transition: border-color 0.2s;
        }
        .special-card:hover { border-color: var(--primary); }
        .special-card input[type="checkbox"] { accent-color: var(--primary); width: 17px; height: 17px; cursor: pointer; flex-shrink: 0; }
        .special-card label { cursor: pointer; font-size: 0.93rem; font-weight: 600; color: var(--text); }
        .special-card .sc-sub { font-size: 0.78rem; color: var(--muted); }

        .btn-calc {
            background: linear-gradient(135deg, var(--primary) 0%, #1662d4 100%);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 11px;
            cursor: pointer;
            font-family: "Cairo", sans-serif;
            font-weight: 700;
            width: 100%;
            font-size: 1.06rem;
            transition: transform 0.12s ease, opacity 0.2s ease, box-shadow 0.2s;
            box-shadow: 0 4px 14px rgba(11,79,179,0.3);
        }
        .btn-calc:hover { transform: translateY(-1px); opacity: 0.94; box-shadow: 0 6px 20px rgba(11,79,179,0.35); }
        .btn-calc:active { transform: translateY(0); }

        /* ===== RESULT CARDS ===== */
        .result-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 20px;
        }

        .result-card {
            background: #f8fbff;
            border: 1px solid #deebff;
            border-radius: 12px;
            padding: 14px 12px;
            text-align: center;
            transition: box-shadow 0.2s;
        }
        .result-card:hover { box-shadow: 0 4px 12px rgba(11,79,179,0.1); }
        .result-card .label { color: var(--muted); font-size: 0.82rem; font-weight: 500; }
        .result-card .value {
            color: var(--primary);
            font-weight: 800;
            font-size: 1.08rem;
            margin-top: 7px;
            direction: ltr;
        }
        .result-card.card-green { background: #f0fdf6; border-color: #b8f0d4; }
        .result-card.card-green .value { color: var(--success); }
