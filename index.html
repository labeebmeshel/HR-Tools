<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Labeeb Meshel - Professional CV</title>
    <style>
        :root { --primary: #0b4fb3; --secondary: #f0f4f8; --white: #ffffff; --text: #1a2a40; --accent: #eaf2ff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f1f5f9; margin: 0; padding: 20px; color: var(--text); line-height: 1.8; }
        .main-container { max-width: 1000px; margin: auto; background: var(--white); border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); padding: 40px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); padding-bottom: 20px; margin-bottom: 30px; flex-wrap: wrap; gap: 20px; }
        .profile-area { display: flex; align-items: center; gap: 20px; }
        .profile-area img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; }
        .sub-tabs { display: flex; gap: 5px; background: var(--accent); padding: 10px; border-radius: 12px; margin-bottom: 30px; flex-wrap: wrap; }
        .sub-btn { padding: 10px 15px; border: none; background: white; border-radius: 8px; cursor: pointer; font-weight: 600; color: var(--primary); }
        .sub-btn.active { background: var(--primary); color: white; }
        .cv-card { background: #fff; border: 1px solid #e2e8f0; padding: 25px; border-radius: 12px; margin-bottom: 20px; border-right: 5px solid var(--primary); }
        .cv-card p { white-space: pre-wrap; }
        .img-container { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
        .thumb { width: 100px; height: 70px; object-fit: cover; border-radius: 6px; cursor: pointer; border: 1px solid #ddd; }
        .btn-lang { padding: 10px 20px; cursor: pointer; border: 2px solid var(--primary); background: var(--white); color: var(--primary); border-radius: 8px; font-weight: bold; }
        #imgModal { display:none; position:fixed; z-index:9999; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); justify-content:center; align-items:center; }
        #imgModal img { max-width:90%; max-height:90%; border-radius:10px; }
    </style>
</head>
<body>
<div id="imgModal" onclick="this.style.display='none'"><img src="" id="modalImg"></div>
<div class="main-container">
    <div class="header-top">
        <div class="profile-area">
            <img src="me.png" alt="Labeeb Meshel">
            <div>
                <h1 id="p-name" style="margin:0; color:var(--primary);">لبيب ميشيل لبيب</h1>
                <p id="p-title" style="margin:0; font-weight:bold; color:#64748b;">HR Section Head & Payroll Expert</p>
            </div>
        </div>
        <button class="btn-lang" id="lang-btn" onclick="toggleLanguage()">English</button>
    </div>
    <div class="sub-tabs" id="sub-tabs-container"></div>
    <div id="sub-content-area"></div>
</div>
<script>
    /* انقل هنا مصفوفة translations ودالة renderPage ودالة switchSub ودالة toggleLanguage من الكود الأصلي الخاص بك */
</script>
</body>
</html>
