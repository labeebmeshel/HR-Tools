<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Labeeb Meshel - HR Expert Portfolio</title>
    <style>
        :root { --primary: #0b4fb3; --secondary: #f0f4f8; --white: #ffffff; --text: #1a2a40; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eaf2ff; margin: 0; color: var(--text); }
        .container { max-width: 1000px; margin: 30px auto; background: var(--white); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,64,160,0.1); overflow: hidden; }
        .tabs-header { display: flex; background: #f8fbff; border-bottom: 1px solid #dbe7ff; }
        .tab-btn { flex: 1; padding: 20px; border: none; background: none; font-size: 1.1rem; font-weight: bold; color: #7f8c8d; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { color: var(--primary); background: var(--white); border-bottom: 3px solid var(--primary); }
        .tab-content { display: none; padding: 30px; animation: fadeIn 0.5s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* CV Styles */
        .lang-switch { text-align: left; margin-bottom: 20px; }
        .btn-lang { padding: 8px 15px; cursor: pointer; border: 1px solid var(--primary); background: var(--white); color: var(--primary); border-radius: 5px; font-weight: bold; }
        .cv-section { margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .cv-section h2 { color: var(--primary); margin-bottom: 15px; }
        .exp-item { margin-bottom: 20px; }
        .exp-item h3 { margin: 0; color: #333; }
        .exp-item span { color: var(--primary); font-size: 0.9rem; font-weight: bold; }
        .skills-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
        .skill-tag { background: var(--secondary); padding: 10px; border-radius: 8px; text-align: center; font-size: 0.9rem; font-weight: 600; }

        /* Calc Styles */
        .input-group { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        input { padding: 12px; border: 1px solid #c9d8f0; border-radius: 10px; flex: 1; min-width: 200px; }
        .calc-btn { background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; display: block; overflow-x: auto; }
        th, td { border: 1px solid #dbe7ff; padding: 12px; text-align: center; }
        th { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs-header">
        <button class="tab-btn active" onclick="openTab(event, 'cv')">السيرة الذاتية / CV</button>
        <button class="tab-btn" onclick="openTab(event, 'calc')">حاسبة الضرائب</button>
    </div>

    <div id="cv" class="tab-content active">
        <div class="lang-switch">
            <button class="btn-lang" onclick="toggleLang()">English / عربي</button>
        </div>
        <div id="cv-data">
            </div>
    </div>

    <div id="calc" class="tab-content">
        <h2 style="text-align:center;">حاسبة كسب العمل والـ Payroll</h2>
        <div class="input-group">
            <input id="salary" type="number" placeholder="إجمالي الراتب الشامل">
            <input id="allowances" type="number" placeholder="البدلات الحقيقية">
        </div>
        <button class="calc-btn" onclick="calculate()">احسب الآن</button>
        <table>
            <thead>
                <tr>
                    <th>الشامل</th><th>البدلات المعفاة</th><th>التأميني</th><th>تأمينات 11%</th><th>الضريبة</th><th>الصافي</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td id="r1">-</td><td id="r2">-</td><td id="r3">-</td><td id="r4">-</td><td id="r5">-</td><td id="r6">-</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    let currentLang = 'ar';
    const cvData = {
        ar: {
            title: "لبيب ميشيل لبيب",
            sub: "رئيس قسم الموارد البشرية | خبير أجور وضرائب دخل",
            expTitle: "الخبرة العملية",
            skillsTitle: "المهارات الاحترافية",
            items: [
                { role: "رئيس قسم الموارد البشرية", org: "جامعة هليوبوليس للتنمية المستدامة", date: "2018 - الحالي" },
                { role: "أخصائي شؤون عاملين", org: "شركة ألوستيل (Alusteel)", date: "2014 - 2016" }
            ],
            skills: ["قانون التأمينات 148", "هيكلة الأجور", "التحليل المالي للمرتبات", "التدريب والتطوير"]
        },
        en: {
            title: "Labeeb Meshel Labeeb",
            sub: "HR Section Head | Payroll & Income Tax Expert",
            expTitle: "Work Experience",
            skillsTitle: "Core Skills",
            items: [
                { role: "HR Section Head", org: "Heliopolis University", date: "2018 - Present" },
                { role: "Personnel Specialist", org: "Alusteel (Trading & Engineering)", date: "2014 - 2016" }
            ],
            skills: ["Insurance Law 148", "Payroll Structuring", "Compensation & Benefits", "Corporate Training"]
        }
    };

    function renderCV() {
        const d = cvData[currentLang];
        let html = `<div style="text-align:center; margin-bottom:30px;">
            <h1 style="color:var(--primary); margin:0;">${d.title}</h1>
            <p style="font-weight:bold; color:#666;">${d.sub}</p>
        </div>
        <div class="cv-section"><h2>${d.expTitle}</h2>`;
        d.items.forEach(i => {
            html += `<div class="exp-item"><h3>${i.role}</h3><span>${i.org} | ${i.date}</span></div>`;
        });
        html += `</div><div class="cv-section"><h2>${d.skillsTitle}</h2><div class="skills-grid">`;
        d.skills.forEach(s => { html += `<div class="skill-tag">${s}</div>`; });
        html += `</div></div>`;
        document.getElementById('cv-data').innerHTML = html;
        document.body.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
    }

    function toggleLang() { currentLang = currentLang === 'ar' ? 'en' : 'ar'; renderCV(); }
    function openTab(evt, name) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(name).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    function tax(inc) {
        if(inc <= 40000) return 0;
        if(inc <= 55000) return (inc-40000)*0.1;
        if(inc <= 70000) return (inc-55000)*0.15 + 1500;
        if(inc <= 200000) return (inc-70000)*0.2 + 3750;
        return (inc-200000)*0.225 + 29750;
    }

    function calculate() {
        const salary = Number(document.getElementById('salary').value);
        const realAllow = Number(document.getElementById('allowances').value);
        let insBase = salary / 1.3;
        let maxAllow = salary - insBase;
        let finalAllow = realAllow > maxAllow ? maxAllow : realAllow;
        let finalInsBase = salary - finalAllow;
        if(finalInsBase < 2700) finalInsBase = 2700; if(finalInsBase > 16700) finalInsBase = 16700;
        const insVal = finalInsBase * 0.11;
        const mTax = tax(Math.max(0, (salary - insVal)*12 - 20000)) / 12;
        document.getElementById('r1').innerText = salary.toFixed(2);
        document.getElementById('r2').innerText = finalAllow.toFixed(2);
        document.getElementById('r3').innerText = finalInsBase.toFixed(2);
        document.getElementById('r4').innerText = insVal.toFixed(2);
        document.getElementById('r5').innerText = mTax.toFixed(2);
        document.getElementById('r6').innerText = (salary - insVal - mTax).toFixed(2);
    }
    renderCV();
</script>
</body>
</html>
