<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S1 Insurance Calculator</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; padding: 20px; display: flex; justify-content: center; }
        .s1-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); max-width: 500px; width: 100%; }
        h2 { color: #0b4fb3; text-align: center; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #cbd5e1; box-sizing: border-box; font-size: 1rem; }
        .btn-calc { background: #0b4fb3; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
        .res-box { margin-top: 20px; padding: 20px; background: #f0f4f8; border-radius: 10px; border-right: 5px solid #0b4fb3; display: none; }
        .res-box p { margin: 5px 0; font-weight: bold; }
    </style>
</head>
<body>
    <div class="s1-box">
        <h2>حساب أجر الاشتراك (استمارة 1)</h2>
        <input id="s1_salary" type="number" placeholder="الراتب الأساسي (الأجر)">
        <input id="s1_allowances" type="number" placeholder="البدلات الحقيقية">
        <button class="btn-calc" onclick="calculateS1()">حساب الأجر التأميني</button>

        <div id="s1_result" class="res-box">
            <p>أجر الاشتراك التأميني: <span id="res_s1_base" style="color:#0b4fb3;">0</span></p>
            <p>البدلات المعفاة قانوناً: <span id="res_s1_allow">0</span></p>
            <p style="font-size:0.8rem; color:#666; margin-top:10px;">* الحدود لعام 2026: (2700 - 16700)</p>
        </div>
    </div>

    <script>
        function calculateS1() {
            const s = Number(document.getElementById('s1_salary').value || 0); // الأجر الأساسي
            const a = Number(document.getElementById('s1_allowances').value || 0); // البدلات
            const t = s + a; // الأجر الشامل الحقيقي
            
            const MAX_INSURANCE_WAGE = 16700;
            const MIN_INSURANCE_WAGE = 2700;
            
            let fBase = s; // الأجر التأميني المبدئي
            
            if (s >= MAX_INSURANCE_WAGE) {
                fBase = MAX_INSURANCE_WAGE;
            } else {
                // حساب أقصى وعاء تأميني يمكن أن تشارك فيه البدلات بنسبة الـ 30% مع هذا الأساسي (الأساسي يمثل 70%)
                let potentialInsurance = s / 0.7;
                
                if (potentialInsurance > MAX_INSURANCE_WAGE) {
                    fBase = MAX_INSURANCE_WAGE;
                } else {
                    // أقصى قيمة إعفاء قانوني مسموح بها مع هذا الراتب
                    let maxAllowableExemption = potentialInsurance * 0.3;
                    
                    if (a <= maxAllowableExemption) {
                        // البدلات بالكامل معفاة لأنها لم تتخطى الـ 30% من وعائها المستهدف
                        fBase = s; 
                    } else {
                        // البدلات تخطت الإعفاء المسموح، فالزيادة تدخل في التأمينات
                        fBase = t - maxAllowableExemption;
                    }
                }
            }
            
            // تطبيق الحدود الدنيا والقصوى الصارمة لعام 2026
            if (fBase > MAX_INSURANCE_WAGE) fBase = MAX_INSURANCE_WAGE;
            if (fBase < MIN_INSURANCE_WAGE && t > 0) fBase = MIN_INSURANCE_WAGE;
            
            // حساب البدلات المعفاة الفعلية (الشامل الحقيقي - الأجر التأميني النهائي)
            let fAllow = t - fBase;
            if (fAllow < 0) fAllow = 0;

            // عرض الأرقام مقربة لأقرب قرشين أو جنيه حسب الرغبة (استخدمنا fixed 2 لتطابق كودك)
            document.getElementById('res_s1_base').innerText = fBase.toFixed(2);
