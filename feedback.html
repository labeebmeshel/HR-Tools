<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الملاحظات - الميثاق الذكي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0b4fb3; --bg: #f1f5f9; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 20px; color: #1e293b; }
        
        #passwordOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; }
        .login-box input { width: 100%; padding: 12px; margin: 20px 0; border: 2px solid #cbd5e1; border-radius: 10px; text-align: center; outline: none; }
        .btn-login { background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }

        #mainContent { display: none; }
        .form-wrapper { max-width: 650px; margin: auto; background: var(--white); padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: var(--primary); text-align: center; margin-bottom: 20px; }
        .input-group { margin-bottom: 18px; text-align: right; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: var(--primary); }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; font-family: inherit; }
        
        /* تنسيق خانة رفع الملف */
        .file-input-wrapper { background: #f8fafc; border: 2px dashed #cbd5e1; padding: 15px; border-radius: 10px; text-align: center; cursor: pointer; }
        .file-input-wrapper:hover { border-color: var(--primary); }
        #fileInput { display: none; }

        .btn-submit { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-submit:disabled { background: #94a3b8; }
        .status-msg { margin-top: 20px; padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div id="passwordOverlay">
    <div class="login-box">
        <i class="fas fa-lock" style="font-size: 3rem; color: var(--primary);"></i>
        <h3>نظام الملاحظات المحمي</h3>
        <input type="password" id="passInput" placeholder="أدخل كلمة المرور">
        <button class="btn-login" onclick="checkPassword()">دخول</button>
    </div>
</div>

<div id="mainContent" class="form-wrapper">
    <h2><i class="fas fa-chart-line"></i> قياس الأداء وتوثيق المشكلات</h2>
    <form id="feedbackForm">
        <div class="input-group">
            <label>اسم الشخص:</label>
            <input type="text" id="userName" required>
        </div>
        <div class="input-group">
            <label>اسم الأداة:</label>
            <input type="text" id="toolName" required>
        </div>
        <div class="input-group">
            <label>نوع الملاحظة:</label>
            <select id="noteType">
                <option>خطأ تقني</option>
                <option>اقتراح تطوير</option>
            </select>
        </div>
        <div class="input-group">
            <label>الوصف:</label>
            <textarea id="description" rows="3" required></textarea>
        </div>
        
        <div class="input-group">
            <label>إرفاق صورة للمشكلة (اختياري):</label>
            <div class="file-input-wrapper" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-cloud-upload-alt"></i> <span id="fileNameDisplay">اضغط لرفع صورة</span>
                <input type="file" id="fileInput" accept="image/*" onchange="updateFileName()">
            </div>
        </div>

        <div class="input-group">
            <label>الأولوية:</label>
            <select id="priority">
                <option>متوسطة</option>
                <option>عالية</option>
            </select>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">إرسال وتوثيق</button>
    </form>
    <div id="statusMsg" class="status-msg"></div>
</div>

<script>
    const SECRET_PASS = "123456"; 
    const SCRIPT_URL = 'ضع_رابط_الاسكريبت_هنا';

    function checkPassword() {
        if (document.getElementById('passInput').value === SECRET_PASS) {
            document.getElementById('passwordOverlay').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
        }
    }

    function updateFileName() {
        const file = document.getElementById('fileInput').files[0];
        document.getElementById('fileNameDisplay').innerText = file ? file.name : "اضغط لرفع صورة";
    }

    document.getElementById('feedbackForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('statusMsg');
        const fileInput = document.getElementById('fileInput');
        
        btn.disabled = true;
        status.style.display = 'block';
        status.style.background = '#e2e8f0';
        status.innerHTML = 'جاري المعالجة والرفع...';

        let fileData = null;
        let fileName = null;
        https://script.google.com/macros/s/AKfycbxDicQ7J8XjF9zkLc0IYYv-4PHK6fa4WfDkTfDFZyxkcoYlz-ETsWGkAm_L3qwRtzsz/exec
        // تحويل الصورة لـ Base64 إذا وجدت
        if (fileInput.files.length > 0) {
            const file = fileInput.files[0];
            fileName = file.name;
            fileData = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        const formData = {
            userName: document.getElementById('userName').value,
            toolName: document.getElementById('toolName').value,
            noteType: document.getElementById('noteType').value,
            description: document.getElementById('description').value,
            priority: document.getElementById('priority').value,
            fileData: fileData,
            fileName: fileName
        };

        // تعديل بسيط لضمان عدم التعليق
        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors', 
            body: JSON.stringify(formData)
        }).then(() => {
            // سنفترض النجاح هنا لأن no-cors لا يعطي ردًا
            status.style.background = '#dcfce7';
            status.style.color = '#15803d';
            status.innerHTML = 'تم الإرسال بنجاح! راجع الشيت الآن.';
            document.getElementById('feedbackForm').reset();
            document.getElementById('fileNameDisplay').innerText = "اضغط لرفع صورة";
            btn.disabled = false;
        }).catch(err => {
            console.error(err);
            status.innerHTML = 'حدث خطأ، تأكد من اتصال الإنترنت.';
            btn.disabled = false;
        });
        });
    });
</script>
</body>
</html>
