<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الملاحظات - الميثاق الذكي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0b4fb3; --bg: #f1f5f9; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 20px; color: #1e293b; }
        .form-wrapper { max-width: 650px; margin: auto; background: var(--white); padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: var(--primary); text-align: center; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #64748b; margin-bottom: 25px; font-size: 0.9rem; }
        
        .input-group { margin-bottom: 18px; text-align: right; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: var(--primary); font-size: 0.95rem; }
        input, select, textarea { 
            width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; 
            font-size: 1rem; outline: none; transition: 0.3s; box-sizing: border-box; background: #fdfdfd;
            font-family: inherit;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px rgba(11, 79, 179, 0.1); }
        
        .btn-submit { 
            background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; 
            font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; 
            display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px;
        }
        .btn-submit:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-submit:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }

        .status-msg { 
            margin-top: 20px; padding: 15px; border-radius: 10px; text-align: center; 
            font-weight: bold; display: none; animation: fadeIn 0.5s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="form-wrapper">
    <h2><i class="fas fa-chart-line"></i> نظام قياس الأداء وتطوير الأدوات</h2>
    <p class="subtitle">سجل ملاحظاتك واقتراحاتك لتحسين تجربة العمل</p>
    
    <form id="feedbackForm">
        <div class="input-group">
            <label>اسم مقدم الملاحظة:</label>
            <input type="text" id="userName" placeholder="اكتب اسمك هنا" required>
        </div>

        <div class="input-group">
            <label>اسم الأداة المعنية:</label>
            <input type="text" id="toolName" placeholder="مثال: حاسبة ضريبة كسب العمل" required>
        </div>

        <div class="input-group">
            <label>نوع الملاحظة:</label>
            <select id="noteType">
                <option value="خطأ">⚠️ خطأ تقني</option>
                <option value="اقتراح تطوير">💡 اقتراح تطوير</option>
                <option value="تحسين تجربة مستخدم">🎨 تحسين تجربة مستخدم</option>
                <option value="فكرة أداة جديدة">🚀 فكرة أداة جديدة</option>
                <option value="ملاحظة عامة">📝 ملاحظة عامة</option>
            </select>
        </div>

        <div class="input-group">
            <label>الوصف الشامل:</label>
            <textarea id="description" rows="3" placeholder="اشرح الملاحظة بشكل واضح..." required></textarea>
        </div>

        <div class="input-group">
            <label>خطوات التكرار (إن وجدت):</label>
            <textarea id="steps" rows="2" placeholder="كيف ظهر الخطأ؟"></textarea>
        </div>

        <div class="input-group">
            <label>مثال تطبيقي:</label>
            <input type="text" id="example" placeholder="رقم / حالة / سيناريو">
        </div>

        <div class="input-group">
            <label>أولوية الملاحظة:</label>
            <select id="priority">
                <option value="منخفضة">🔵 منخفضة</option>
                <option value="متوسطة">🟡 متوسطة</option>
                <option value="عالية">🔴 عالية</option>
            </select>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
            <i class="fas fa-paper-plane"></i> إرسال الملاحظة للنظام
        </button>
    </form>

    <div id="statusMsg" class="status-msg"></div>
</div>

<script>
    // الرابط الخاص بك المحدث والمدمج
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxPED7F54Z89VoUQzjEwKke79t39BpZTbZ1t6lIxrJ_r6QCbaKVaDRwU__AWZbP-6Q1/exec';

    document.getElementById('feedbackForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('statusMsg');
        
        btn.disabled = true;
        status.style.display = 'block';
        status.style.background = '#e2e8f0';
        status.style.color = '#1e293b';
        status.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري تسجيل البيانات في النظام...';

        const formData = {
            userName: document.getElementById('userName').value,
            toolName: document.getElementById('toolName').value,
            noteType: document.getElementById('noteType').value,
            description: document.getElementById('description').value,
            steps: document.getElementById('steps').value,
            example: document.getElementById('example').value,
            priority: document.getElementById('priority').value
        };

        // استخدام Fetch مع وضع no-cors للسماح بإرسال البيانات للجوجل سكريبت بنجاح
        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors', 
            cache: 'no-cache',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
        }).then(() => {
            // مع وضع no-cors، الطلب ينجح دائماً في الوصول للشيت حتى لو لم يرجع رد
            status.style.background = '#dcfce7';
            status.style.color = '#15803d';
            status.innerHTML = '<i class="fas fa-check-circle"></i> تم الإرسال بنجاح! راجع ملف الإكسيل الآن.';
            document.getElementById('feedbackForm').reset();
            btn.disabled = false;
            
            // إخفاء رسالة النجاح بعد 4 ثواني
            setTimeout(() => { status.style.display = 'none'; }, 4000);
        }).catch(err => {
            status.style.background = '#fee2e2';
            status.style.color = '#b91c1c';
            status.innerHTML = '<i class="fas fa-exclamation-triangle"></i> عذراً، لم نتمكن من الوصول للنظام.';
            btn.disabled = false;
        });
    });
</script>

</body>
</html>
