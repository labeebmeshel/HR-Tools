<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطوير الأداء - الميثاق الذكي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0b4fb3; --accent: #10b981; --bg: #f8fafc; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        #passwordOverlay { position: fixed; inset: 0; background: rgba(11, 79, 179, 0.05); backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .card { background: var(--white); padding: 40px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 90%; max-width: 650px; }
        .input-group { margin-bottom: 20px; text-align: right; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: var(--primary); }
        input, select, textarea { width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 12px; outline: none; box-sizing: border-box; }
        .upload-area { border: 2px dashed #cbd5e1; padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; }
        .upload-area.confirmed { border-color: var(--accent); background: #f0fdf4; }
        .btn-submit { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .status-box { margin-top: 20px; padding: 15px; border-radius: 12px; text-align: center; display: none; font-weight: bold; }
    </style>
</head>
<body>

<div id="passwordOverlay">
    <div class="card" style="max-width: 350px; text-align: center;">
        <i class="fas fa-lock" style="font-size: 3rem; color: var(--primary); margin-bottom: 15px;"></i>
        <h3>نظام الملاحظات الداخلي</h3>
        <input type="password" id="passInput" placeholder="أدخل كلمة المرور" style="text-align: center;">
        <button class="btn-submit" onclick="checkAuth()" style="margin-top: 15px;">دخول</button>
    </div>
</div>

<div id="mainContent" style="display: none;">
    <div class="card">
        <h2 style="text-align: center; color: var(--primary);">قياس الأداء وتوثيق التطوير</h2>
        <form id="perfForm">
            <div class="input-group">
                <label>اسم الموظف</label>
                <input type="text" id="userName" required>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="input-group">
                    <label>الأداة</label>
                    <input type="text" id="toolName" required>
                </div>
                <div class="input-group">
                    <label>النوع</label>
                    <select id="noteType">
                        <option>خطأ تقني</option>
                        <option>اقتراح تطوير</option>
                    </select>
                </div>
            </div>
            <div class="input-group">
                <label>الوصف</label>
                <textarea id="description" rows="3" required></textarea>
            </div>
            <div class="input-group">
                <label>الصورة (اختياري)</label>
                <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
                    <i class="fas fa-image" id="uploadIcon"></i>
                    <div id="fileText">اضغط لاختيار صورة للمشكلة</div>
                    <input type="file" id="fileInput" accept="image/*" onchange="handleFile()" style="display: none;">
                </div>
            </div>
            <div class="input-group">
                <label>الأولوية</label>
                <select id="priority">
                    <option>منخفضة</option>
                    <option>متوسطة</option>
                    <option>عالية</option>
                </select>
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">إرسال الملاحظة</button>
        </form>
        <div id="statusBox" class="status-box"></div>
    </div>
</div>

<script>
    const AUTH_KEY = "123456"; 
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwP95V1rByneQmF6-Ve0iZJgN2tbgC3uGxFWY_LilX47qur8Vp67-9Rn9-tG5q47ma-/exec";

    function checkAuth() {
        if (document.getElementById('passInput').value === AUTH_KEY) {
            document.getElementById('passwordOverlay').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
        } else { alert("كلمة المرور خطأ!"); }
    }

    function handleFile() {
        const file = document.getElementById('fileInput').files[0];
        if (file) {
            document.getElementById('fileText').innerHTML = `<b style="color: #10b981;">✅ تم تأكيد الصورة: ${file.name}</b>`;
            document.getElementById('dropZone').classList.add('confirmed');
            alert("تم تأكيد الصورة وجاهزة للرفع.");
        }
    }

    document.getElementById('perfForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('statusBox');
        const fileInput = document.getElementById('fileInput');

        btn.disabled = true;
        btn.innerHTML = "جاري الإرسال...";
        status.style.display = 'block';
        status.style.background = '#f1f5f9';
        status.innerText = "برجاء الانتظار...";

        let fileData = null;
        if (fileInput.files.length > 0) {
            const reader = new FileReader();
            fileData = await new Promise(resolve => {
                reader.onload = ev => resolve(ev.target.result);
                reader.readAsDataURL(fileInput.files[0]);
            });
        }

        const payload = {
            userName: document.getElementById('userName').value,
            toolName: document.getElementById('toolName').value,
            noteType: document.getElementById('noteType').value,
            description: document.getElementById('description').value,
            priority: document.getElementById('priority').value,
            fileData: fileData,
            fileName: fileInput.files.length > 0 ? fileInput.files[0].name : null
        };

        fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) })
        .then(() => {
            status.style.background = '#dcfce7';
            status.innerText = "✅ تم تسجيل الملاحظة بنجاح!";
            document.getElementById('perfForm').reset();
            btn.disabled = false;
            btn.innerHTML = "إرسال الملاحظة";
        }).catch(() => {
            status.style.background = '#fee2e2';
            status.innerText = "❌ فشل الإرسال، تحقق من الاتصال.";
            btn.disabled = false;
        });
    });
</script>
</body>
</html>
